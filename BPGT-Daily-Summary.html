<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#185FA5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BPGT Summary">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPGT Terminal — Operations Summary</title>
    <style>
        :root {
            --blue: #185FA5;
            --blue-light: #E6F1FB;
            --blue-mid: #378ADD;
            --teal: #0F6E56;
            --teal-light: #E1F5EE;
            --amber: #BA7517;
            --amber-light: #FAEEDA;
            --green: #3B6D11;
            --green-light: #EAF3DE;
            --red: #A32D2D;
            --red-light: #FCEBEB;
            --gray-50: #F6F6F4;
            --gray-100: #EDEDEA;
            --gray-200: #D3D1C7;
            --gray-500: #5F5E5A;
            --gray-700: #2C2C2A;
            --text: #1a1a18;
            --text-muted: #5F5E5A;
            --text-faint: #888780;
            --border: rgba(0,0,0,0.1);
            --border-light: rgba(0,0,0,0.06);
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--gray-50);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.5;
        }
        .header {
            background: var(--blue);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        
        /* Updated Logo Class to fetch local background layout path safely */
        .header-icon { 
            width: 36px; 
            height: 36px; 
            background-color: rgba(255,255,255,0.15); 
            background-image: url('images/logo.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .header-title { color: #fff; font-size: 15px; font-weight: 600; }
        .header-sub { color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 1px; }
        .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .hbtn {
            border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.12);
            color: #fff; padding: 6px 13px; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px;
            transition: background 0.2s; white-space: nowrap;
        }
        .hbtn:hover { background: rgba(255,255,255,0.25); }
        .hbtn.print-pdf { background: rgba(255,255,255,0.2); }
        .hbtn.print-hard { background: rgba(255,255,255,0.2); }
        #last-updated { font-size: 11px; color: rgba(255,255,255,0.45); white-space: nowrap; }
        .filter-bar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            position: sticky;
            top: 66px;
            z-index: 99;
        }
        .filter-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-right: 2px; }
        .period-btn {
            padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border);
            background: #fff; cursor: pointer; font-size: 12px; color: var(--text-muted);
            transition: all 0.15s; white-space: nowrap;
        }
        .period-btn:hover { border-color: var(--blue-mid); color: var(--blue); }
        .period-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 500; }
        .date-input {
            padding: 5px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border);
            font-size: 12px; color: var(--text); background: #fff; display: none;
        }
        .date-input.visible { display: block; }
        .filter-status { font-size: 11px; color: var(--text-faint); margin-left: auto; white-space: nowrap; }
        .main { padding: 18px 24px; max-width: 1100px; margin: 0 auto; }
        
        .status-msg {
            padding: 10px 14px; border-radius: var(--radius-sm);
            font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.5;
        }
        .status-msg.loading { background: var(--blue-light); color: var(--blue); display: block; }
        .status-msg.error { background: var(--red-light); color: var(--red); display: block; }
        .status-msg.warn { background: var(--amber-light); color: var(--amber); display: block; }
        
        .hero-banner {
            position: relative; height: 220px; overflow: hidden;
            background: #0a1e46;
        }
        .hero-slides { position: absolute; inset: 0; }
        .hero-slide {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1.2s ease;
        }
        .hero-slide.active { opacity: 1; }
        
        /* Local structural directory mappings for safety and scalability */
        .hero-slide.slide-1 { background-image: url('images/hero-bg-1.jpg'); }
        .hero-slide.slide-2 { background-image: url('images/hero-bg-2.jpg'); }
        
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(10,30,70,0.5) 0%, rgba(10,30,70,0.72) 100%);
        }
        .hero-content {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; z-index: 2;
        }
        .hero-motto { color: #fff; text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        .hero-line1, .hero-line2 {
            font-size: 15px; font-weight: 400; letter-spacing: 0.03em;
            opacity: 0.9; margin-bottom: 0;
        }
        .hero-line1 em, .hero-line2 em {
            font-size: 24px; font-weight: 700; font-style: normal;
            display: block; margin-top: -2px; margin-bottom: 6px;
        }
        .hero-line3 {
            margin-top: 12px; font-size: 13px; opacity: 0.8;
            line-height: 1.5; border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 10px;
        }
        .hero-line3 em { font-style: normal; font-weight: 700; }
        
        .footer {
            text-align: center; padding: 20px; font-size: 11px;
            color: var(--text-faint); border-top: 1px solid var(--border-light);
            margin-top: 28px;
        }
        
        @media (min-width: 600px) {
            .hero-banner { height: 260px; }
            .hero-line1, .hero-line2 { font-size: 17px; }
            .hero-line1 em, .hero-line2 em { font-size: 30px; }
            .hero-line3 { font-size: 14px; }
        }
        @media print { 
            .hero-banner { display: none !important; }
            .filter-bar { display: none !important; }
            .hbtn { display: none !important; }
        }
    </style>
</head>
<body>
    <!-- HEADER BAR -->
    <header class="header">
        <div class="header-left">
            <div class="header-icon"></div>
            <div>
                <h1 class="header-title">Brooke's Point Grand Terminal</h1>
                <p class="header-sub">Operations Summary Dashboard</p>
            </div>
        </div>
        <div class="header-right">
            <span id="last-updated">Not yet loaded</span>
            <button class="hbtn" onclick="loadData()"><span class="spinner" style="display:none;"></span> Refresh</button>
            <button class="hbtn print-pdf" onclick="window.print()">Save PDF</button>
            <button class="hbtn print-hard" onclick="window.print()">Print</button>
        </div>
    </header>

    <!-- FILTER SELECTION BAR -->
    <nav class="filter-bar">
        <span class="filter-label">Period:</span>
        <button class="period-btn active" onclick="setPeriod('today', this)">Today</button>
        <button class="period-btn" onclick="setPeriod('week', this)">This week</button>
        <button class="period-btn" onclick="setPeriod('month', this)">This month</button>
        <button class="period-btn" onclick="setPeriod('quarter', this)">This quarter</button>
        <button class="period-btn" onclick="setPeriod('year', this)">This year</button>
        <button class="period-btn" onclick="setPeriod('custom', this)">Date range</button>
        <input type="date" id="start-date" class="date-input" onchange="handleCustomDateChange()">
        <input type="date" id="end-date" class="date-input" onchange="handleCustomDateChange()">
        <span id="filter-status" class="filter-status"></span>
    </nav>

    <!-- HERO BANNER -->
    <div class="hero-banner">
        <div class="hero-slides">
            <div class="hero-slide active slide-1"></div>
            <div class="hero-slide slide-2"></div>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-motto">
                <p class="hero-line1">Excellence in <em>Every Move</em></p>
